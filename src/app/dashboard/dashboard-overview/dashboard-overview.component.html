<section class="rounded-xl border border-slate-200 bg-white p-3">
  <div class="mb-3 flex items-center justify-between">
    <h2 class="text-2xl font-bold text-slate-900">Dashboard Overview</h2>
    <span class="text-sm text-indigo-600">{{ today | date: 'dd MMM yyyy' }}</span>
  </div>

  <app-overview-cards [cards]="summaryCards"></app-overview-cards>
</section>

<section class="grid gap-3 xl:grid-cols-[2fr_1fr]">
  <app-map-panel></app-map-panel>
  <app-alerts-panel [alerts]="alerts"></app-alerts-panel>
</section>

<section class="grid gap-3 xl:grid-cols-[2.2fr_1fr]">
  <app-activities-table [activities]="activities"></app-activities-table>
  <!-- <app-revenue-panel [bars]="revenueBars"></app-revenue-panel> -->
</section>
