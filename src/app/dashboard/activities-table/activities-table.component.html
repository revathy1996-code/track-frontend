<article class="rounded-xl border border-slate-200 bg-white p-3">
  <div class="mb-3 flex items-center justify-between">
    <h3 class="text-base font-bold text-slate-900">Recent Activities Table</h3>
    <button type="button" class="rounded-md border border-slate-300 px-2 py-1 text-xs">See details</button>
  </div>

  <div class="overflow-x-auto rounded-lg border border-slate-200">
    <table class="w-full min-w-[680px] border-collapse text-sm">
      <thead class="bg-slate-50 text-left text-xs text-slate-600">
        <tr>
          <th class="border-b border-slate-200 px-3 py-2">Date & Time</th>
          <th class="border-b border-slate-200 px-3 py-2">Activity</th>
          <th class="border-b border-slate-200 px-3 py-2">Details</th>
          <th class="border-b border-slate-200 px-3 py-2">Status</th>
        </tr>
      </thead>
      <tbody>
        @for (item of activities; track item.time) {
          <tr class="bg-white">
            <td class="border-b border-slate-100 px-3 py-3 text-slate-700">{{ item.time }}</td>
            <td class="border-b border-slate-100 px-3 py-3 text-slate-700">{{ item.activity }}</td>
            <td class="border-b border-slate-100 px-3 py-3 text-slate-600">{{ item.detail }}</td>
            <td class="border-b border-slate-100 px-3 py-3">
              <span
                class="rounded-full bg-emerald-100 px-2 py-1 text-xs font-bold text-emerald-700"
                [class.bg-amber-100]="item.status === 'In Transit'"
                [class.text-amber-700]="item.status === 'In Transit'"
              >
                {{ item.status }}
              </span>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</article>
