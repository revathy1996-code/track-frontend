<aside
  class="hidden h-full shrink-0 border-r border-slate-200 bg-white p-4 transition-all duration-200 lg:flex lg:flex-col"
  [class.w-64]="!isCollapsed"
  [class.w-20]="isCollapsed"
>
  <div class="mb-5 flex items-center" [class.justify-between]="!isCollapsed" [class.justify-center]="isCollapsed">
    <div class="flex items-center gap-2" [class.justify-center]="isCollapsed">
      <div
        class="grid h-8 w-8 place-items-center rounded-full bg-linear-to-br from-blue-600 to-cyan-400 text-sm font-bold text-white"
      >
        T
      </div>
      <span *ngIf="!isCollapsed" class="text-lg font-bold text-blue-700">Track</span>
    </div>

    <button
      type="button"
      class="rounded-lg p-2 text-slate-600 hover:bg-slate-100"
      (click)="toggleSidebar()"
      [attr.aria-label]="isCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        class="h-5 w-5"
      >
        <path d="M15 18l-6-6 6-6" *ngIf="!isCollapsed"></path>
        <path d="M9 18l6-6-6-6" *ngIf="isCollapsed"></path>
      </svg>
    </button>
  </div>
