<article class="flex flex-col rounded-xl border border-slate-200 bg-white p-3">
  <h3 class="mb-3 text-base font-bold text-slate-900">Alerts & Notifications Section</h3>
  <div class="space-y-2">
    @for (alert of alerts; track alert.title) {
      <div class="rounded-lg border border-slate-200 bg-slate-50 p-2.5">
        <h4 class="text-sm font-semibold text-slate-900">{{ alert.title }}</h4>
        <p class="mt-1 text-xs leading-5 text-slate-600">{{ alert.details }}</p>
      </div>
    }
  </div>
  <button type="button" class="mt-3 rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold text-white">
    See all
  </button>
</article>
